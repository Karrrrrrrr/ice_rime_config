patch:
  # 可以在输入的时候输入特殊字符保持输入
  "speller/alphabet": "zyxwvutsrqponmlkjihgfedcba-,./_[]"
  # 在中文输入法 输入下面的字符也是英文的,对写代码友好
  "punctuator/import_preset": null
  "punctuator/full_shape":
    ";": ";"
    "(": "("
    ")": ")"
    "[": "["
    "]": "]"
    "{": "{"
    "}": "}"
    "/": "/"
    "\\": "\\"
    "<": "<"
    ">": ">"
    "@": "@"
    "#": "#"
    "%": "%"
    "$": "$"
    "^": "^"
    "&": "&"
    "*": "*"
    "_": "_"
    "+": "+"
    "=": "="
    "|": "|"
    "~": "~"
    "`": "`"